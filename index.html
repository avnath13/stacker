<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#10131c" />
    <title>Stacker</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #10131c;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #game {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* HUD overlay */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #f4f6fb;
      }
      #score {
        margin-top: max(28px, env(safe-area-inset-top));
        font-size: clamp(44px, 12vw, 96px);
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1;
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.35);
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      #score.show {
        opacity: 1;
      }

      /* Centered panels (menu / game over) */
      .panel {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 14px;
        padding: 24px;
        transition: opacity 0.3s ease;
      }
      .panel.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .title {
        font-size: clamp(40px, 13vw, 86px);
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .subtitle {
        font-size: clamp(15px, 4.5vw, 20px);
        font-weight: 500;
        opacity: 0.7;
      }
      .big-score {
        font-size: clamp(56px, 18vw, 120px);
        font-weight: 800;
        line-height: 1;
      }
      .best {
        font-size: clamp(14px, 4vw, 18px);
        font-weight: 600;
        opacity: 0.65;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .hint {
        font-size: clamp(12px, 3.6vw, 15px);
        font-weight: 500;
        opacity: 0.45;
        letter-spacing: 0.02em;
      }

      /* Difficulty selector */
      .difficulty {
        display: flex;
        gap: 10px;
        margin-top: 22px;
      }
      .diff-btn {
        pointer-events: auto;
        cursor: pointer;
        font: 600 clamp(13px, 4vw, 16px) / 1 inherit;
        color: #f4f6fb;
        background: rgba(255, 255, 255, 0.05);
        border: 1.5px solid rgba(255, 255, 255, 0.22);
        border-radius: 999px;
        padding: 11px 22px;
        transition: background 0.15s ease, color 0.15s ease,
          border-color 0.15s ease, transform 0.1s ease;
      }
      .diff-btn:hover {
        border-color: rgba(255, 255, 255, 0.5);
      }
      .diff-btn:active {
        transform: scale(0.95);
      }
      .diff-btn.active {
        background: #f4f6fb;
        color: #10131c;
        border-color: #f4f6fb;
      }
      /* When a panel is hidden, its buttons must not swallow taps meant for the
         game canvas underneath (pointer-events:auto would otherwise re-enable
         hit-testing on the invisible buttons). */
      .panel.hidden .diff-btn {
        pointer-events: none;
      }
      .diff-label {
        font-size: clamp(12px, 3.4vw, 14px);
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.5;
        margin-top: 6px;
      }
      .pulse {
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.55;
          transform: translateY(0);
        }
        50% {
          opacity: 0.95;
          transform: translateY(-3px);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
      <div id="hud">
        <div id="score">0</div>

        <div id="menu" class="panel">
          <div class="title">STACKER</div>
          <div class="subtitle pulse">Tap, click, or press Space to start</div>
          <div class="hint">Hold to rapid-drop</div>
          <div class="diff-label">Difficulty&nbsp;&nbsp;←&nbsp;→</div>
          <div class="difficulty">
            <button class="diff-btn" data-diff="easy">Easy</button>
            <button class="diff-btn" data-diff="normal">Normal</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
          </div>
        </div>

        <div id="gameover" class="panel hidden">
          <div class="best" id="go-best">Best 0</div>
          <div class="big-score" id="go-score">0</div>
          <div class="subtitle pulse">Tap to play again</div>
          <div class="difficulty">
            <button class="diff-btn" data-diff="easy">Easy</button>
            <button class="diff-btn" data-diff="normal">Normal</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
